version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '${API_PORT:-3001}:3001'
    environment:
      NODE_ENV: production
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      AI_BASE_URL: ${AI_BASE_URL}
      AI_API_KEY: ${AI_API_KEY}
      AI_MODEL: ${AI_MODEL}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      API_PORT: 3001
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Ollama (local AI) ───────────────────────────────────────────────────────
  # Start with: docker compose --profile ollama up
  # When using Ollama in Docker set AI_BASE_URL=http://ollama:11434/v1 in .env
  ollama:
    image: ollama/ollama:latest
    profiles: [ollama]
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'ollama list || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Pulls required models on first run by exec-ing into the server container.
  # Uses docker exec so pulls run inside the server with no network latency.
  # Exits cleanly once done — safe to re-run (Ollama skips already-cached models).
  ollama-pull:
    image: docker:cli
    profiles: [ollama]
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        docker exec docbase-ollama-1 ollama pull llama3.2 &&
        docker exec docbase-ollama-1 ollama pull nomic-embed-text
    restart: 'no'

volumes:
  ollama_data:
